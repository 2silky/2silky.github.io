<header>
  <div>
    <img class="particles-photo" src="{{ site.photo }}" />
    <h1><a class="site-title" href="/">{{ site.title }}</a>
    <small>
      {% if site.tagshort %}
      {{ site.tagshort }}
      {% else %}
      {{ site.taglong }}
      {% endif %}
    </small>
    </h1>
  </div>
  <a id="theme-toggle" class="toggle-icon" onclick="modeSwitcher()"></a>
</header>
