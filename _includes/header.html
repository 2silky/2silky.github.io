<header>
  <style>
    h1 {text-align: center;}
    </style>
  <div>
    <a href="/"><img class="particles-photo" src="{{ site.photo }}" /></a>
    <h1><a class="site-title" href="/">{{ site.title }}</a><br>
    <small>
      {% if site.tagshort %}
      {{ site.tagshort }}
      {% else %}
      {{ site.taglong }}
      {% endif %}
    </small></h1>
  </div>
  <a id="theme-toggle" class="toggle-icon" onclick="modeSwitcher()"></a>
</header>
